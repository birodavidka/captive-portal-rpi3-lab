#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0;
    policy drop;

    ct state { established, related } accept
    iif "lo" accept

    # Allow SSH to the Pi (adjust sources later if needed)
    tcp dport 22 accept

    # DHCP + DNS for Wi-Fi clients
    iif "wlan0" udp dport { 67, 53 } accept
    iif "wlan0" tcp dport 53 accept

    # Allow ICMP (ping)
    ip protocol icmp accept
  }

  chain forward {
    type filter hook forward priority 0;
    policy drop;

    ct state { established, related } accept
    iif "wlan0" oif "eth0" accept
  }

  chain output {
    type filter hook output priority 0;
    policy accept;
  }
}

table ip nat {
  chain prerouting {
    type nat hook prerouting priority -100;
  }

  chain postrouting {
    type nat hook postrouting priority 100;
    oif "eth0" masquerade
  }
}
